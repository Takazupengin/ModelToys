spring.application.name=ms-gateway
server.port=8085

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ====================================================================
# CONFIGURACIÓN DE RUTAS DEL GATEWAY (BYPASS DIRECTO DE PUERTOS)
# ====================================================================

# [0] MICROSERVICIO DE CATÁLOGO
spring.cloud.gateway.server.webmvc.routes[0].id=catalogo-route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://MS-CATALOGO
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/products/**

# [1] MICROSERVICIO DE CARRITO (Directo al puerto)
spring.cloud.gateway.server.webmvc.routes[1].id=ms-carrito
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/cart/**

# [2] MICROSERVICIO DE VENTAS (BYPASS DIRECTO AL PUERTO 8083)
spring.cloud.gateway.server.webmvc.routes[2].id=ventas-route
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/sales/**

# [3] MICROSERVICIO DE INVENTARIO (BYPASS DIRECTO AL PUERTO 8081)
spring.cloud.gateway.server.webmvc.routes[3].id=inventario-route
spring.cloud.gateway.server.webmvc.routes[3].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/inventory/**

# ====================================================================
# CONFIGURACIONES DE REGISTRO (EUREKA)
# ====================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true